name: Rust CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🏗 Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy, rustfmt

      - name: 🧪 Run Cargo check
        run: cargo check

      - name: 🧹 Run Clippy
        run: cargo clippy -- -D warnings

      - name: 🎨 Run Cargo fmt
        run: cargo fmt -- --check

  build:
    runs-on: ${{ matrix.runs-on.os }}
    name: build (${{ matrix.runs-on.os }}, ${{ matrix.build.profile }})
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        runs-on:
          - os: ubuntu-latest
            binary_ext: ""

          - os: windows-latest
            binary_ext: .exe

        build:
          - profile: debug
            cargo_args: ""

          - profile: release
            cargo_args: --release

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🏗 Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1

      - name: 🏗️ Build (${{ matrix.runs-on.os }} / ${{ matrix.build.profile }})
        run: cargo build ${{ matrix.build.cargo_args }}

      - name: 📦 Rename binary
        run: mv target/${{ matrix.build.profile }}/pdup-rs${{ matrix.runs-on.binary_ext }} target/${{ matrix.build.profile }}/pdup-rs-${{ matrix.build.profile }}${{ matrix.runs-on.binary_ext }}

      - name: 📦 Upload artifact (${{ matrix.runs-on.os }} / ${{ matrix.build.profile }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: target/${{ matrix.build.profile }}/pdup-rs-${{ matrix.build.profile }}${{ matrix.runs-on.binary_ext }}
          if-no-files-found: error
          retention-days: 7
          archive: false

  collect:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Final Results
    timeout-minutes: 2
    needs:
      - test
      - build
    steps:
      - name: ✔️ Fail if any dependency failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
